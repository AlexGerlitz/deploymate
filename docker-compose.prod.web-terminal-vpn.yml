services:
  codex-mobile-terminal-server:
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      ALL_PROXY: ${WEB_TERMINAL_ALL_PROXY:-http://172.18.0.1:8118}
      HTTP_PROXY: ${WEB_TERMINAL_HTTP_PROXY:-http://172.18.0.1:8118}
      HTTPS_PROXY: ${WEB_TERMINAL_HTTPS_PROXY:-http://172.18.0.1:8118}
      WEB_TERMINAL_VPN_ENABLE: ${WEB_TERMINAL_VPN_ENABLE:-0}
      WEB_TERMINAL_VPN_BOOTSTRAP_SCRIPT: ${WEB_TERMINAL_VPN_BOOTSTRAP_SCRIPT:-/vpn/bootstrap.sh}
      WEB_TERMINAL_VPN_TEARDOWN_SCRIPT: ${WEB_TERMINAL_VPN_TEARDOWN_SCRIPT:-/vpn/teardown.sh}
      WEB_TERMINAL_VPN_NETWORK_TEST_HOST: ${WEB_TERMINAL_VPN_NETWORK_TEST_HOST:-}
      NO_PROXY: ${WEB_TERMINAL_NO_PROXY:-localhost,127.0.0.1,::1,codex-mobile-terminal-server,codex-mobile-terminal-web,backend,frontend,proxy,postgres}
      all_proxy: ${WEB_TERMINAL_ALL_PROXY:-http://172.18.0.1:8118}
      http_proxy: ${WEB_TERMINAL_HTTP_PROXY:-http://172.18.0.1:8118}
      https_proxy: ${WEB_TERMINAL_HTTPS_PROXY:-http://172.18.0.1:8118}
      no_proxy: ${WEB_TERMINAL_NO_PROXY:-localhost,127.0.0.1,::1,codex-mobile-terminal-server,codex-mobile-terminal-web,backend,frontend,proxy,postgres}
    volumes:
      - /opt/codex-mobile-terminal-data/vpn:/vpn
