services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEPLOYMATE_ADMIN_USERNAME: ${DEPLOYMATE_ADMIN_USERNAME}
      DEPLOYMATE_ADMIN_PASSWORD: ${DEPLOYMATE_ADMIN_PASSWORD}
      DEPLOYMATE_SERVER_CREDENTIALS_KEY: ${DEPLOYMATE_SERVER_CREDENTIALS_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      DEPLOYMATE_LOCAL_DOCKER_ENABLED: ${DEPLOYMATE_LOCAL_DOCKER_ENABLED:-false}
      DEPLOYMATE_PUBLIC_SIGNUP_ENABLED: ${DEPLOYMATE_PUBLIC_SIGNUP_ENABLED:-true}
      DEPLOYMATE_SSH_HOST_KEY_CHECKING: ${DEPLOYMATE_SSH_HOST_KEY_CHECKING:-accept-new}
      DEPLOYMATE_SSH_KNOWN_HOSTS_FILE: ${DEPLOYMATE_SSH_KNOWN_HOSTS_FILE:-/tmp/deploymate_known_hosts}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_LOCAL_DEPLOYMENTS_ENABLED: ${NEXT_PUBLIC_LOCAL_DEPLOYMENTS_ENABLED:-0}
        NEXT_PUBLIC_PUBLIC_SIGNUP_ENABLED: ${NEXT_PUBLIC_PUBLIC_SIGNUP_ENABLED:-1}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend

  codex-mobile-terminal-server:
    build:
      context: ./products/codex-mobile-terminal
      dockerfile: server/Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      PORT: 4020
      HOST: 0.0.0.0
      WEB_TERMINAL_SESSION_SECRET: ${WEB_TERMINAL_SESSION_SECRET}
      TERMINAL_SHELL: /bin/bash
      TERMINAL_TMUX_SESSION: codex-mobile
      TERMINAL_WORKDIR: /workspace
    volumes:
      - /opt/deploymate:/workspace
      - /opt/codex-mobile-terminal-data/root-dot-codex:/root/.codex
      - /opt/codex-mobile-terminal-data/root-config:/root/.config/codex-mobile-terminal

  codex-mobile-terminal-web:
    build:
      context: ./products/codex-mobile-terminal
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      WEB_TERMINAL_USERNAME: ${WEB_TERMINAL_USERNAME}
      WEB_TERMINAL_PASSWORD: ${WEB_TERMINAL_PASSWORD}
      WEB_TERMINAL_SESSION_SECRET: ${WEB_TERMINAL_SESSION_SECRET}
      WEB_TERMINAL_COOKIE_SECURE: ${WEB_TERMINAL_COOKIE_SECURE:-1}
      TERMINAL_SERVER_HTTP_URL: http://codex-mobile-terminal-server:4020
    depends_on:
      - codex-mobile-terminal-server

  proxy:
    image: public.ecr.aws/docker/library/caddy:2-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - frontend
      - backend
      - codex-mobile-terminal-web
      - codex-mobile-terminal-server
    environment:
      DOMAIN: ${DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
