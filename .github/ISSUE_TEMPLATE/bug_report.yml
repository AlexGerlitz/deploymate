name: Bug report
description: Report a reproducible problem in the product, demo, or release flow.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Keep this focused on one problem with concrete repro steps.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken, and where did you hit it?
      placeholder: A short description of the observed bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: surface
    attributes:
      label: Surface
      description: Which area is affected?
      placeholder: frontend, backend, admin, release workflow, demo, docs
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste a short log excerpt or add a screenshot if it helps.
      render: shell

