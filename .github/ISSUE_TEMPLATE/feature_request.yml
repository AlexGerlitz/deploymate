name: Feature request
description: Suggest a product, platform, or developer workflow improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for feature work, roadmap items, or workflow improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or friction are you trying to solve?
      placeholder: The current workflow is ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: We should add ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention alternatives, tradeoffs, or rejected options if relevant.
  - type: input
    id: area
    attributes:
      label: Area
      description: Which area does this belong to?
      placeholder: frontend, backend, admin, runtime, release pipeline, docs
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true

