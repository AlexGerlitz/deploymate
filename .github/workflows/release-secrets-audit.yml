name: Release Secrets Audit

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to audit"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
      incident_self_test:
        description: "Manual incident self-test action"
        required: true
        type: choice
        default: none
        options:
          - none
          - open
          - update
          - resolve
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-${{ github.event_name }}-${{ matrix.target_environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target_environment:
          - production
          - staging
    environment: ${{ matrix.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine audit mode
        id: audit_mode
        shell: bash
        run: |
          node scripts/release_audit_mode.js \
            --phase initial \
            --event-name "${{ github.event_name }}" \
            --matrix-target-environment "${{ matrix.target_environment }}" \
            --selected-target-environment "${{ inputs.target_environment }}" \
            --incident-self-test-action "${{ inputs.incident_self_test }}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.audit_mode.outputs.run_remote_audit == 'true'
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          if [ -z "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_PRIVATE_KEY secret" >&2
            exit 1
          fi

          if [ -z "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_KNOWN_HOSTS secret" >&2
            exit 1
          fi

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run release secret contract audit
        if: steps.audit_mode.outputs.run_remote_audit == 'true'
        shell: bash
        run: |
          bash scripts/release_secret_contract_audit.sh \
            --host "${{ secrets.DEPLOY_HOST }}" \
            --repo-dir "${{ secrets.DEPLOY_REPO_DIR }}" \
            --env-file "${{ secrets.DEPLOY_ENV_FILE }}" \
            --admin-username "${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}" \
            --admin-password "${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}"

      - name: Finalize audit mode
        id: audit_finalize
        if: always() && steps.audit_mode.outputs.selected_target == 'true'
        shell: bash
        run: |
          node scripts/release_audit_mode.js \
            --phase final \
            --event-name "${{ github.event_name }}" \
            --selected-target "${{ steps.audit_mode.outputs.selected_target }}" \
            --self-test-action "${{ steps.audit_mode.outputs.self_test_action }}" \
            --job-status "${{ job.status }}" >> "$GITHUB_OUTPUT"

      - name: Write audit summary
        if: always() && steps.audit_mode.outputs.selected_target == 'true'
        shell: bash
        run: |
          {
            echo "## Release Secrets Audit"
            echo
            echo "- Environment: \`${{ matrix.target_environment }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Status: \`${{ steps.audit_finalize.outputs.effective_status }}\`"
            echo "- Incident self-test: \`${{ steps.audit_finalize.outputs.self_test_action }}\`"
            echo "- Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify audit result
        if: always() && steps.audit_mode.outputs.run_notify == 'true'
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_NOTIFICATION_WEBHOOK: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}
        run: |
          if [ -z "$DEPLOY_NOTIFICATION_WEBHOOK" ]; then
            echo "[notify] DEPLOY_NOTIFICATION_WEBHOOK is not configured"
            exit 0
          fi

          bash scripts/send_workflow_notification.sh \
            --webhook-url "$DEPLOY_NOTIFICATION_WEBHOOK" \
            --workflow "Release secrets audit" \
            --environment "${{ matrix.target_environment }}" \
            --status "${{ job.status }}" \
            --surface "secret-contract" \
            --smoke "drift audit" \
            --commit "${{ github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --details "trigger=${{ github.event_name }}"

      - name: Triage scheduled audit incident
        if: always() && steps.audit_finalize.outputs.run_triage == 'true'
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: ${{ matrix.target_environment }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ steps.audit_finalize.outputs.effective_status }}
          INCIDENT_SELF_TEST_ACTION: ${{ steps.audit_finalize.outputs.self_test_action }}
          INCIDENT_ASSIGNEE: ${{ vars.RELEASE_AUDIT_INCIDENT_ASSIGNEE }}
          INCIDENT_FAILURE_THRESHOLD: ${{ vars.RELEASE_AUDIT_INCIDENT_FAILURE_THRESHOLD }}
        with:
          script: |
            const { triageReleaseAuditIncident } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release_audit_incident.js`);
            await triageReleaseAuditIncident({ github, context, core, env: process.env });
