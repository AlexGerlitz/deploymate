name: Release Secrets Audit

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to audit"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-${{ github.event_name }}-${{ matrix.target_environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target_environment:
          - production
          - staging
    environment: ${{ matrix.target_environment }}

    steps:
      - name: Checkout
        if: github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment
        uses: actions/checkout@v6

      - name: Prepare SSH
        if: github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          if [ -z "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_PRIVATE_KEY secret" >&2
            exit 1
          fi

          if [ -z "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_KNOWN_HOSTS secret" >&2
            exit 1
          fi

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run release secret contract audit
        if: github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment
        shell: bash
        run: |
          bash scripts/release_secret_contract_audit.sh \
            --host "${{ secrets.DEPLOY_HOST }}" \
            --repo-dir "${{ secrets.DEPLOY_REPO_DIR }}" \
            --env-file "${{ secrets.DEPLOY_ENV_FILE }}" \
            --admin-username "${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}" \
            --admin-password "${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}"

      - name: Write audit summary
        if: always() && (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment)
        shell: bash
        run: |
          {
            echo "## Release Secrets Audit"
            echo
            echo "- Environment: \`${{ matrix.target_environment }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Status: \`${{ job.status }}\`"
            echo "- Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify audit result
        if: always() && (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment)
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_NOTIFICATION_WEBHOOK: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}
        run: |
          if [ -z "$DEPLOY_NOTIFICATION_WEBHOOK" ]; then
            echo "[notify] DEPLOY_NOTIFICATION_WEBHOOK is not configured"
            exit 0
          fi

          bash scripts/send_workflow_notification.sh \
            --webhook-url "$DEPLOY_NOTIFICATION_WEBHOOK" \
            --workflow "Release secrets audit" \
            --environment "${{ matrix.target_environment }}" \
            --status "${{ job.status }}" \
            --surface "secret-contract" \
            --smoke "drift audit" \
            --commit "${{ github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --details "trigger=${{ github.event_name }}"

      - name: Open or update scheduled audit incident
        if: failure() && github.event_name == 'schedule'
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: ${{ matrix.target_environment }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const envName = process.env.TARGET_ENVIRONMENT;
            const title = `[release-secrets-audit] ${envName} scheduled audit failing`;
            const body = [
              "## Release secrets audit incident",
              "",
              `The scheduled release secrets audit is failing for \`${envName}\`.`,
              "",
              `- Environment: \`${envName}\``,
              `- Workflow run: ${process.env.RUN_URL}`,
              `- Ref: \`${process.env.REF_NAME}\``,
              `- Commit: \`${process.env.COMMIT_SHA.slice(0, 7)}\``,
              "",
              "Expected operator action:",
              "1. Open the failed run and read the failing step output.",
              "2. Fix secret drift, SSH connectivity, or target env mismatch.",
              "3. Re-run `Release Secrets Audit` manually to confirm recovery.",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "ci,release",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Scheduled audit is still failing.\n\n- Run: ${process.env.RUN_URL}\n- Commit: \`${process.env.COMMIT_SHA.slice(0, 7)}\``,
              });
              core.notice(`Updated existing incident issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["ci", "release"],
            });

            core.notice(`Opened incident issue #${created.data.number}`);

      - name: Resolve scheduled audit incident
        if: success() && github.event_name == 'schedule'
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: ${{ matrix.target_environment }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const envName = process.env.TARGET_ENVIRONMENT;
            const title = `[release-secrets-audit] ${envName} scheduled audit failing`;
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "ci,release",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (!existing) {
              core.notice(`No open incident issue found for ${envName}`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: `Scheduled audit recovered.\n\n- Run: ${process.env.RUN_URL}`,
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed",
            });

            core.notice(`Closed incident issue #${existing.number}`);
