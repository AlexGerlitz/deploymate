name: Release Secrets Audit

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to audit"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging

concurrency:
  group: release-secrets-audit-${{ inputs.target_environment }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          if [ -z "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_PRIVATE_KEY secret" >&2
            exit 1
          fi

          if [ -z "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_KNOWN_HOSTS secret" >&2
            exit 1
          fi

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run release secret contract audit
        shell: bash
        run: |
          bash scripts/release_secret_contract_audit.sh \
            --host "${{ secrets.DEPLOY_HOST }}" \
            --repo-dir "${{ secrets.DEPLOY_REPO_DIR }}" \
            --env-file "${{ secrets.DEPLOY_ENV_FILE }}" \
            --admin-username "${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}" \
            --admin-password "${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}"

      - name: Write audit summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Secrets Audit"
            echo
            echo "- Environment: \`${{ inputs.target_environment }}\`"
            echo "- Status: \`${{ job.status }}\`"
            echo "- Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
