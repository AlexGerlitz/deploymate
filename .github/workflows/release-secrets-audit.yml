name: Release Secrets Audit

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to audit"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
      incident_self_test:
        description: "Manual incident self-test action"
        required: true
        type: choice
        default: none
        options:
          - none
          - open
          - update
          - resolve
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-${{ github.event_name }}-${{ matrix.target_environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target_environment:
          - production
          - staging
    environment: ${{ matrix.target_environment }}

    steps:
      - name: Checkout
        if: (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment) && !(github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none')
        uses: actions/checkout@v6

      - name: Prepare SSH
        if: (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment) && !(github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none')
        shell: bash
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          if [ -z "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_PRIVATE_KEY secret" >&2
            exit 1
          fi

          if [ -z "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            echo "[release-secrets-audit] missing DEPLOY_SSH_KNOWN_HOSTS secret" >&2
            exit 1
          fi

          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run release secret contract audit
        if: (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment) && !(github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none')
        shell: bash
        run: |
          bash scripts/release_secret_contract_audit.sh \
            --host "${{ secrets.DEPLOY_HOST }}" \
            --repo-dir "${{ secrets.DEPLOY_REPO_DIR }}" \
            --env-file "${{ secrets.DEPLOY_ENV_FILE }}" \
            --admin-username "${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}" \
            --admin-password "${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}"

      - name: Write audit summary
        if: always() && (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment)
        shell: bash
        run: |
          {
            echo "## Release Secrets Audit"
            echo
            echo "- Environment: \`${{ matrix.target_environment }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Status: \`${{ github.event_name == 'workflow_dispatch' && inputs.incident_self_test == 'resolve' && 'success' || github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none' && 'failure' || job.status }}\`"
            echo "- Incident self-test: \`${{ github.event_name == 'workflow_dispatch' && inputs.incident_self_test || 'none' }}\`"
            echo "- Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify audit result
        if: always() && (github.event_name == 'schedule' || matrix.target_environment == inputs.target_environment) && !(github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none')
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_NOTIFICATION_WEBHOOK: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}
        run: |
          if [ -z "$DEPLOY_NOTIFICATION_WEBHOOK" ]; then
            echo "[notify] DEPLOY_NOTIFICATION_WEBHOOK is not configured"
            exit 0
          fi

          bash scripts/send_workflow_notification.sh \
            --webhook-url "$DEPLOY_NOTIFICATION_WEBHOOK" \
            --workflow "Release secrets audit" \
            --environment "${{ matrix.target_environment }}" \
            --status "${{ job.status }}" \
            --surface "secret-contract" \
            --smoke "drift audit" \
            --commit "${{ github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --details "trigger=${{ github.event_name }}"

      - name: Triage scheduled audit incident
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none'))
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: ${{ matrix.target_environment }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ github.event_name == 'workflow_dispatch' && inputs.incident_self_test == 'resolve' && 'success' || github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none' && 'failure' || job.status }}
          INCIDENT_SELF_TEST_ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.incident_self_test || 'none' }}
          INCIDENT_ASSIGNEE: ${{ vars.RELEASE_AUDIT_INCIDENT_ASSIGNEE }}
          INCIDENT_FAILURE_THRESHOLD: ${{ vars.RELEASE_AUDIT_INCIDENT_FAILURE_THRESHOLD }}
        with:
          script: |
            const envName = process.env.TARGET_ENVIRONMENT;
            const { owner, repo } = context.repo;
            const currentStatus = process.env.JOB_STATUS;
            const selfTestAction = process.env.INCIDENT_SELF_TEST_ACTION || "none";
            const isSelfTest = selfTestAction !== "none";
            const title = isSelfTest
              ? `[release-secrets-audit:self-test] ${envName} scheduled audit incident flow`
              : `[release-secrets-audit] ${envName} scheduled audit failing`;
            const assignee = (process.env.INCIDENT_ASSIGNEE || "").trim();
            const threshold = Math.max(parseInt(process.env.INCIDENT_FAILURE_THRESHOLD || "3", 10) || 3, 1);
            const incidentLabel = "incident";
            const incidentTestLabel = "incident:test";
            const mediumSeverityLabel = "severity:medium";
            const highSeverityLabel = "severity:high";

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function listOpenIssues() {
              return github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state: "open",
                labels: isSelfTest ? "ci,release,incident:test" : "ci,release",
                per_page: 100,
              });
            }

            async function recentFailureStreak() {
              if (isSelfTest) {
                if (selfTestAction === "update") {
                  return threshold;
                }
                return 1;
              }

              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: "release-secrets-audit.yml",
                branch: context.ref.replace("refs/heads/", ""),
                event: "schedule",
                per_page: 100,
              });

              let streak = 1;
              for (const run of runs) {
                if (run.id === context.runId) {
                  continue;
                }

                const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                });

                const job = jobs.find((entry) => entry.name === `audit (${envName})`);
                if (!job || job.status !== "completed") {
                  continue;
                }

                if (job.conclusion === "failure") {
                  streak += 1;
                  continue;
                }

                break;
              }

              return streak;
            }

            const issues = await listOpenIssues();
            const existing = issues.find((issue) => issue.title === title);
            const managedLabels = isSelfTest
              ? ["ci", "release", incidentLabel, incidentTestLabel, mediumSeverityLabel, highSeverityLabel]
              : ["ci", "release", incidentLabel, mediumSeverityLabel, highSeverityLabel];

            if (currentStatus === "success") {
              if (!existing) {
                core.notice(`No open incident issue found for ${envName}`);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: isSelfTest
                  ? `Incident self-test resolved successfully.\n\n- Action: \`${selfTestAction}\`\n- Run: ${process.env.RUN_URL}`
                  : `Scheduled audit recovered.\n\n- Run: ${process.env.RUN_URL}`,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed",
              });

              core.notice(`Closed incident issue #${existing.number}`);
              return;
            }

            if (currentStatus !== "failure") {
              core.notice(`Skipping incident triage for status ${currentStatus}`);
              return;
            }

            await ensureLabel(incidentLabel, "b60205", "Operational incident raised by scheduled audit automation");
            if (isSelfTest) {
              await ensureLabel(incidentTestLabel, "1d76db", "Controlled self-test incident generated by audit workflow");
            }
            await ensureLabel(mediumSeverityLabel, "fbca04", "Medium-severity operational issue");
            await ensureLabel(highSeverityLabel, "d93f0b", "High-severity operational issue");

            const failureStreak = await recentFailureStreak();
            const severityLabel = failureStreak >= threshold ? highSeverityLabel : mediumSeverityLabel;
            const severityText = failureStreak >= threshold ? "high" : "medium";
            const labels = isSelfTest
              ? ["ci", "release", incidentLabel, incidentTestLabel, severityLabel]
              : ["ci", "release", incidentLabel, severityLabel];
            const issueBody = [
              isSelfTest ? "## Release secrets audit incident self-test" : "## Release secrets audit incident",
              "",
              isSelfTest
                ? `This is a controlled self-test for the \`${envName}\` scheduled audit incident flow. No production or staging outage is implied.`
                : `The scheduled release secrets audit is failing for \`${envName}\`.`,
              "",
              `- Environment: \`${envName}\``,
              ...(isSelfTest ? [`- Self-test action: \`${selfTestAction}\``] : []),
              `- Severity: \`${severityText}\``,
              `- Consecutive scheduled failures: \`${failureStreak}\``,
              `- Escalation threshold: \`${threshold}\``,
              `- Workflow run: ${process.env.RUN_URL}`,
              `- Ref: \`${process.env.REF_NAME}\``,
              `- Commit: \`${process.env.COMMIT_SHA.slice(0, 7)}\``,
              "",
              ...(isSelfTest
                ? [
                    "Expected operator action:",
                    "1. Confirm that the issue title, labels, and comments match the requested self-test action.",
                    "2. Re-run the self-test with `update` to verify issue reuse and severity escalation.",
                    "3. Re-run the self-test with `resolve` to verify automatic closure.",
                  ]
                : [
                    "Expected operator action:",
                    "1. Open the failed run and read the failing step output.",
                    "2. Fix secret drift, SSH connectivity, or target env mismatch.",
                    "3. Re-run `Release Secrets Audit` manually to confirm recovery.",
                  ]),
            ].join("\n");

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: issueBody,
                labels,
                assignees: assignee ? [assignee] : existing.assignees.map((entry) => entry.login),
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: [
                  isSelfTest ? "Incident self-test updated the existing issue." : "Scheduled audit is still failing.",
                  "",
                  ...(isSelfTest ? [`- Self-test action: \`${selfTestAction}\``] : []),
                  `- Severity: \`${severityText}\``,
                  `- Consecutive scheduled failures: \`${failureStreak}\``,
                  `- Run: ${process.env.RUN_URL}`,
                  `- Commit: \`${process.env.COMMIT_SHA.slice(0, 7)}\``,
                ].join("\n"),
              });

              core.notice(`Updated existing incident issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body: issueBody,
              labels,
              assignees: assignee ? [assignee] : undefined,
            });

            core.notice(`Opened incident issue #${created.data.number}`);
