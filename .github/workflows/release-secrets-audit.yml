name: Release Secrets Audit

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to audit"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
      incident_self_test:
        description: "Manual incident self-test action"
        required: true
        type: choice
        default: none
        options:
          - none
          - open
          - update
          - resolve
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: read
  issues: write

jobs:
  manual-audit:
    name: audit (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.incident_self_test == 'none'
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-manual-${{ inputs.target_environment }}
      cancel-in-progress: true
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run release secrets audit
        uses: ./.github/actions/release-secrets-audit
        with:
          target-environment: ${{ inputs.target_environment }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-ssh-known-hosts: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          deploy-repo-dir: ${{ secrets.DEPLOY_REPO_DIR }}
          deploy-env-file: ${{ secrets.DEPLOY_ENV_FILE }}
          admin-username: ${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}
          admin-password: ${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}
          notification-webhook: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}

  scheduled-production:
    name: audit (production)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-scheduled-production
      cancel-in-progress: true
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run release secrets audit
        uses: ./.github/actions/release-secrets-audit
        with:
          target-environment: production
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-ssh-known-hosts: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          deploy-repo-dir: ${{ secrets.DEPLOY_REPO_DIR }}
          deploy-env-file: ${{ secrets.DEPLOY_ENV_FILE }}
          admin-username: ${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}
          admin-password: ${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}
          notification-webhook: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}

      - name: Triage scheduled audit incident
        if: always()
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: production
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
          INCIDENT_SELF_TEST_ACTION: none
          INCIDENT_ASSIGNEE: ${{ vars.RELEASE_AUDIT_INCIDENT_ASSIGNEE }}
          INCIDENT_FAILURE_THRESHOLD: ${{ vars.RELEASE_AUDIT_INCIDENT_FAILURE_THRESHOLD }}
        with:
          script: |
            const { triageReleaseAuditIncident } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release_audit_incident.js`);
            await triageReleaseAuditIncident({ github, context, core, env: process.env });

  scheduled-staging:
    name: audit (staging)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-scheduled-staging
      cancel-in-progress: true
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run release secrets audit
        uses: ./.github/actions/release-secrets-audit
        with:
          target-environment: staging
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          deploy-ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-ssh-known-hosts: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          deploy-repo-dir: ${{ secrets.DEPLOY_REPO_DIR }}
          deploy-env-file: ${{ secrets.DEPLOY_ENV_FILE }}
          admin-username: ${{ secrets.DEPLOYMATE_ADMIN_USERNAME }}
          admin-password: ${{ secrets.DEPLOYMATE_ADMIN_PASSWORD }}
          notification-webhook: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK }}

      - name: Triage scheduled audit incident
        if: always()
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: staging
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
          INCIDENT_SELF_TEST_ACTION: none
          INCIDENT_ASSIGNEE: ${{ vars.RELEASE_AUDIT_INCIDENT_ASSIGNEE }}
          INCIDENT_FAILURE_THRESHOLD: ${{ vars.RELEASE_AUDIT_INCIDENT_FAILURE_THRESHOLD }}
        with:
          script: |
            const { triageReleaseAuditIncident } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release_audit_incident.js`);
            await triageReleaseAuditIncident({ github, context, core, env: process.env });

  incident-self-test:
    name: incident self-test
    if: github.event_name == 'workflow_dispatch' && inputs.incident_self_test != 'none'
    runs-on: ubuntu-latest
    concurrency:
      group: release-secrets-audit-self-test-${{ inputs.target_environment }}
      cancel-in-progress: true
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine self-test status
        id: self_test
        shell: bash
        run: |
          node scripts/release_audit_mode.js \
            --event-name "${{ github.event_name }}" \
            --self-test-action "${{ inputs.incident_self_test }}" \
            --job-status "${{ job.status }}" >> "$GITHUB_OUTPUT"

      - name: Write audit summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Secrets Audit"
            echo
            echo "- Environment: \`${{ inputs.target_environment }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Status: \`${{ steps.self_test.outputs.effective_status }}\`"
            echo "- Incident self-test: \`${{ steps.self_test.outputs.self_test_action }}\`"
            echo "- Actions run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Triage self-test incident
        if: always()
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ steps.self_test.outputs.effective_status }}
          INCIDENT_SELF_TEST_ACTION: ${{ steps.self_test.outputs.self_test_action }}
          INCIDENT_ASSIGNEE: ${{ vars.RELEASE_AUDIT_INCIDENT_ASSIGNEE }}
          INCIDENT_FAILURE_THRESHOLD: ${{ vars.RELEASE_AUDIT_INCIDENT_FAILURE_THRESHOLD }}
        with:
          script: |
            const { triageReleaseAuditIncident } = require(`${process.env.GITHUB_WORKSPACE}/scripts/release_audit_incident.js`);
            await triageReleaseAuditIncident({ github, context, core, env: process.env });
