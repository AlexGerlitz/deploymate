<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-label="DeployMate reviewer demo flow diagram">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#f5efe3" />
    </linearGradient>
    <style>
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #1f2937; }
      .body { font: 600 14px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #374151; }
      .stepTitle { font: 700 17px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #111827; }
      .stepBody { font: 500 13px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #4b5563; }
    </style>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309" />
    </marker>
  </defs>
  <rect width="980" height="260" rx="28" fill="url(#bg2)" />
  <text x="40" y="52" class="title">Reviewer Demo Flow</text>
  <text x="40" y="78" class="body">A clean path for a hiring reviewer to validate product quality in a few minutes.</text>

  <g transform="translate(40,118)">
    <rect width="180" height="96" rx="20" fill="#fff" stroke="#e5d3b3" />
    <text x="22" y="34" class="stepTitle">1. Register</text>
    <text x="22" y="58" class="stepBody">Create a safe trial account</text>
    <text x="22" y="76" class="stepBody">at `/register`.</text>
  </g>

  <g transform="translate(272,118)">
    <rect width="180" height="96" rx="20" fill="#fff" stroke="#e5d3b3" />
    <text x="22" y="34" class="stepTitle">2. Land In App</text>
    <text x="22" y="58" class="stepBody">Signup creates a session</text>
    <text x="22" y="76" class="stepBody">and redirects into the product.</text>
  </g>

  <g transform="translate(504,118)">
    <rect width="180" height="96" rx="20" fill="#fff" stroke="#e5d3b3" />
    <text x="22" y="34" class="stepTitle">3. Explore Depth</text>
    <text x="22" y="58" class="stepBody">Open `/app/users` and</text>
    <text x="22" y="76" class="stepBody">`/app/upgrade-requests`.</text>
  </g>

  <g transform="translate(736,118)">
    <rect width="180" height="96" rx="20" fill="#fff" stroke="#e5d3b3" />
    <text x="22" y="34" class="stepTitle">4. Validate Quality</text>
    <text x="22" y="58" class="stepBody">Review saved views, audit,</text>
    <text x="22" y="76" class="stepBody">exports, and restore dry-run.</text>
  </g>

  <path d="M 220 166 L 272 166" stroke="#b45309" stroke-width="4" marker-end="url(#arrow2)" fill="none" />
  <path d="M 452 166 L 504 166" stroke="#b45309" stroke-width="4" marker-end="url(#arrow2)" fill="none" />
  <path d="M 684 166 L 736 166" stroke="#b45309" stroke-width="4" marker-end="url(#arrow2)" fill="none" />
</svg>
